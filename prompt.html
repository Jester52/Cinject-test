<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Prompts - Cronos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1c1e21;
            --accent: #1a73e8;
            --border: #dddfe2;
            --danger: #fa3e3e;
            --success: #31a24c;
        }

        body.dark-mode {
            --bg: #18191a;
            --card-bg: #242526;
            --text: #e4e6eb;
            --border: #3e4042;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding-bottom: 50px;
            transition: background 0.3s, color 0.3s;
        }

        header {
            background: var(--card-bg);
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header-top h1 { font-size: 18px; margin: 0; color: var(--accent); }

        .search-wrapper {
            background: var(--bg);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 5px 12px;
        }

        .search-wrapper input {
            border: none;
            background: transparent;
            color: var(--text);
            padding: 8px;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .container {
            padding: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .sala-indicator {
            font-size: 12px;
            background: var(--accent);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        details.editor-section {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        summary {
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-body { padding: 15px; border-top: 1px solid var(--border); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; margin-bottom: 5px; opacity: 0.7; font-weight: bold; text-transform: uppercase; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-save { background: var(--accent); color: white; }
        .btn-cancel { background: var(--border); color: var(--text); }

        .prompts-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 768px) {
            .prompts-list { grid-template-columns: repeat(2, 1fr); }
        }

        .prompt-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
            transition: 0.3s;
        }

        .prompt-card.active-prompt {
            border: 2px solid var(--success);
            box-shadow: 0 0 10px rgba(49, 162, 76, 0.2);
        }

        .prompt-card h3 { margin: 0 0 10px 0; font-size: 16px; color: var(--accent); }

        .preview-content {
            background: var(--bg);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 12px;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            line-clamp: 4; 
            overflow: hidden;
            max-height: 5.6em; 
            white-space: pre-wrap;
        }

        .card-actions {
            display: flex;
            justify-content: space-around;
            border-top: 1px solid var(--border);
            padding-top: 10px;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            opacity: 0.8;
            flex: 1;
            cursor: pointer;
        }

        .action-btn .material-symbols-outlined { font-size: 24px; }
        .action-btn.copy { color: var(--accent); }
        .action-btn.activate { color: var(--success); }
        .action-btn.delete { color: var(--danger); }

        .active-badge {
            position: absolute;
            top: -10px;
            right: 10px;
            background: var(--success);
            color: white;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body class="dark-mode">

<header>
    <div class="header-top">
        <h1>Cronos <span id="salaTag" class="sala-indicator">Cargando...</span></h1>
        <button onclick="document.body.classList.toggle('dark-mode')" style="background:none; border:none; color:var(--text); cursor:pointer">
            <span class="material-symbols-outlined">contrast</span>
        </button>
    </div>
    <div class="search-wrapper">
        <span class="material-symbols-outlined" style="opacity: 0.5;">search</span>
        <input type="text" id="searchBar" placeholder="Buscar en mis prompts...">
    </div>
</header>

<div class="container">
    <details class="editor-section" id="editor-details">
        <summary>
            <span id="summaryText">Crear Nuevo Prompt</span>
            <span class="material-symbols-outlined">add_circle</span>
        </summary>
        <div class="form-body">
            <input type="hidden" id="pId">
            <div class="form-group">
                <label>Título de la Rutina</label>
                <input type="text" id="pTitle" placeholder="Ej: Adivinación Famoso">
            </div>
            <div class="form-group">
                <label>Instrucciones (Usa {{SEARCH}})</label>
                <textarea id="pContent" rows="8" placeholder="Escribe aquí el prompt..."></textarea>
            </div>
            <div class="btn-group">
                <button class="btn btn-save" onclick="saveData()">Guardar en Sala</button>
                <button class="btn btn-cancel" onclick="closeEditor()">Cerrar</button>
            </div>
        </div>
    </details>

    <div class="prompts-list" id="promptsList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCqNmPPbSLzw7SkQp2QQ1YFNGaCRFSqeQQ",
        authDomain: "cinyect.firebaseapp.com",
        databaseURL: "https://cinyect-default-rtdb.firebaseio.com",
        projectId: "cinyect",
        storageBucket: "cinyect.firebasestorage.app",
        messagingSenderId: "747813074248",
        appId: "1:747813074248:web:a7eec94a6211f45a1a2f7d"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const miSala = new URLSearchParams(window.location.search).get('id') || 'general';
    let localData = {};
    let promptActivoId = "";
    
    document.getElementById('salaTag').innerText = miSala.toUpperCase();

    const defaultPrompts = [
        { titulo: "PERSONAJE FAMOSO", contenido: "Dime información sobre el personaje famoso: {{SEARCH}}\n\nResponde de forma breve y directa con:\n- Profesión\n- Proyectos más famosos (máximo 3)\n- 2 datos curiosos" },
        { titulo: "LUGAR DEL MUNDO", contenido: "Dime información sobre el lugar: {{SEARCH}}\n\nPrimero indica qué tipo de lugar es (país, ciudad, restaurante, monumento, etc.).\n\nSi es un país o ciudad, incluye:\n- Capital (solo si es país)\n- Clima general\n- Población exacta\n- Moneda\n- Comida más famosa\n\nResponde de forma breve y directa." },
        { titulo: "PALABRA", contenido: "Define la palabra: {{SEARCH}}\n\nResponde con una definición clara, breve y directa." },
        { titulo: "CANCIÓN O ARTISTA", contenido: "Dime información sobre: {{SEARCH}}\n\nPrimero identifica si es una canción o un artista.\n\n- Si es una canción: indica el artista.\n- Si es un artista: indica su canción más famosa.\n\nResponde de forma breve y directa." }
    ];

    const salaRef = db.ref(`usuarios/${miSala}/prompts`);
    const activoRef = db.ref(`usuarios/${miSala}/promptActivo`);

    // ESCUCHA DE PROMPTS Y PROMPT ACTIVO
    db.ref(`usuarios/${miSala}`).on('value', (snapshot) => {
        const val = snapshot.val() || {};
        const data = val.prompts;
        promptActivoId = val.promptActivo ? val.promptActivo.id : "";

        if (!data) {
            defaultPrompts.forEach(p => salaRef.push({...p, fecha: Date.now()}));
        } else {
            localData = data;
            render(localData);
        }
    });

    function render(data) {
        const list = document.getElementById('promptsList');
        list.innerHTML = '';
        Object.keys(data).reverse().forEach(id => {
            const item = data[id];
            const isActive = id === promptActivoId;
            const div = document.createElement('div');
            div.className = `prompt-card ${isActive ? 'active-prompt' : ''}`;
            div.innerHTML = `
                ${isActive ? '<span class="active-badge">ACTIVO IA</span>' : ''}
                <h3>${item.titulo}</h3>
                <div class="preview-content">${item.contenido}</div>
                <div class="card-actions">
                    <button class="action-btn activate" onclick="activarPromptIA('${id}')">
                        <span class="material-symbols-outlined">bolt</span>Activar
                    </button>
                    <button class="action-btn copy" onclick="copyToClipboard('${id}')">
                        <span class="material-symbols-outlined">content_copy</span>Copiar
                    </button>
                    <button class="action-btn" onclick="loadToEdit('${id}')">
                        <span class="material-symbols-outlined">edit</span>Editar
                    </button>
                    <button class="action-btn delete" onclick="removeData('${id}')">
                        <span class="material-symbols-outlined">delete</span>Borrar
                    </button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function activarPromptIA(id) {
        const prompt = localData[id];
        activoRef.set({
            id: id,
            titulo: prompt.titulo,
            contenido: prompt.contenido,
            fecha: Date.now()
        }).then(() => {
            if (navigator.vibrate) navigator.vibrate(50);
        });
    }

    function saveData() {
        const id = document.getElementById('pId').value;
        const titulo = document.getElementById('pTitle').value.trim();
        const contenido = document.getElementById('pContent').value.trim();
        if(!titulo || !contenido) return;
        const obj = { titulo, contenido, fecha: Date.now() };

        if(id) { 
            salaRef.child(id).update(obj); 
        } else { 
            salaRef.push(obj); 
        }
        closeEditor();
    }

    function loadToEdit(id) {
        const item = localData[id];
        document.getElementById('pId').value = id;
        document.getElementById('pTitle').value = item.titulo;
        document.getElementById('pContent').value = item.contenido;
        document.getElementById('summaryText').innerText = "Editando Rutina";
        document.getElementById('editor-details').open = true;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function removeData(id) {
        if(confirm("¿Eliminar este prompt?")) salaRef.child(id).remove();
    }

    async function copyToClipboard(id) {
        try {
            const promptOriginal = localData[id].contenido;
            const snapshot = await db.ref(`usuarios/${miSala}/busquedaActual/palabra`).once('value');
            const busquedaReal = snapshot.val() || "[Sin búsqueda]";
            const promptFinal = promptOriginal.replace(/{{SEARCH}}/g, busquedaReal);
            await navigator.clipboard.writeText(promptFinal);
            alert(`Copiado con: "${busquedaReal}"`);
        } catch (err) { alert("Error al copiar"); }
    }

    function closeEditor() {
        document.getElementById('pId').value = '';
        document.getElementById('pTitle').value = '';
        document.getElementById('pContent').value = '';
        document.getElementById('summaryText').innerText = "Crear Nuevo Prompt";
        document.getElementById('editor-details').open = false;
    }

    document.getElementById('searchBar').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = {};
        Object.keys(localData).forEach(id => {
            if(localData[id].titulo.toLowerCase().includes(query) || 
               localData[id].contenido.toLowerCase().includes(query)) {
                filtered[id] = localData[id];
            }
        });
        render(filtered);
    });

    // Escucha de palabra para vibración/notificación
    let ultimaPalabraDetectada = "";
    db.ref(`usuarios/${miSala}/busquedaActual`).on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.palabra && data.palabra !== "RESET" && data.palabra !== ultimaPalabraDetectada) {
            ultimaPalabraDetectada = data.palabra;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            console.log("Nueva palabra para IA:", ultimaPalabraDetectada);
        }
    });
</script>
</body>
</html>
